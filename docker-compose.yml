services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: usdcpay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      SERVICE: api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on: [db, redis]

  listener:
    build: .
    environment:
      SERVICE: listener
    env_file: .env
    depends_on: [db, redis]

  worker:
    build: .
    environment:
      SERVICE: worker
    env_file: .env
    depends_on: [db, redis]

volumes:
  pgdata:
